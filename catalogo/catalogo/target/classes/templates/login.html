<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <!-- Fonte moderna -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #0d1b2a, #1b263b);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border-radius: 15px;
            padding: 40px;
            width: 320px;
            color: #fff;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            text-align: center;
        }

        .login-box h2 {
            margin-bottom: 25px;
            font-weight: 600;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            font-size: 14px;
            margin-bottom: 5px;
            display: block;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            outline: none;
            background: rgba(255,255,255,0.2);
            color: #fff;
            transition: 0.3s;
        }

        .input-group input::placeholder {
            color: #ddd;
        }

        .input-group input:focus {
            background: rgba(255,255,255,0.3);
            box-shadow: 0 0 5px #fff;
        }

        .btn-dark-blue {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: #fff;
            color: #0d1b2a;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-dark-blue:hover {
            background: transparent;
            color: #fff;
            border: 1px solid #fff;
        }

        .footer {
            margin-top: 15px;
            font-size: 13px;
        }

        .footer a {
            color: #fff;
            text-decoration: none;
            font-weight: 500;
        }

        .footer a:hover {
            text-decoration: underline;
        }

    </style>
</head>
<body>

<div class="login-box">
    <h2>Bem-vindo</h2>

    <form th:action="@{/login}" method="post">
        <div class="input-group">
            <label>Usuário</label>
            <input type="text" name="username" placeholder="Digite seu usuário" required>
        </div>

        <div class="input-group">
            <label>Senha</label>
            <input type="password" name="password" placeholder="Digite sua senha" required>
        </div>

        <button type="submit" class="btn-dark-blue">Entrar</button>
    </form>

    <div class="footer">
        <p>Esqueceu a senha? <a href="#">Recuperar</a></p>
    </div>
</div>

</body>
</html>
