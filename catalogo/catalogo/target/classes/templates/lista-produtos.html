<!DOCTYPE html>
<html lang="pt-br"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Produtos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .bg-dark-blue {
            background-color: #0d1b2a !important;
        }

        .btn-dark-blue {
            background-color: #0d1b2a;
            color: #fff;
            border: none;
        }

        .btn-dark-blue:hover {
            background-color: #fff;
            color: black;
        }

        .table-dark-blue {
            background-color: #0d1b2a;
            color: #fff;
        }
    </style>
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark-blue mb-4">
    <div class="container d-flex justify-content-between">

        <a class="navbar-brand" href="/produtos">
            FATEC - Gerenciador de Catálogo
        </a>

        <div>
            <a sec:authorize="!isAuthenticated()"
               href="/login"
               class="btn btn-outline-light me-2">
                Entrar
            </a>

            <form sec:authorize="isAuthenticated()"
                  th:action="@{/logout}"
                  method="post"
                  style="display:inline;">
                <button type="submit" class="btn btn-danger">
                    Sair
                </button>
            </form>
        </div>

    </div>
</nav>

<div class="container">
    <div class="card shadow">

        <div sec:authorize="hasRole('ADMIN')" class="m-3">
            <a href="/produtos/novo" class="btn btn-success">
                Novo Produto
            </a>
        </div>

        <div class="card-body">

            <!-- 🔎 BUSCA (CORRIGIDA) -->
            <div class="mb-3">
                <form method="get" action="/produtos" class="d-flex">

                    <input type="text"
                           name="nome"
                           class="form-control me-2"
                           placeholder="Buscar produto pelo nome..."
                           th:value="${param.nome}">

                    <button type="submit" class="btn btn-dark-blue">
                        Buscar
                    </button>

                </form>
            </div>

            <!-- 📋 TABELA -->
            <table class="table table-hover">

                <thead class="table-dark-blue">
                <tr>
                    <th>ID</th>
                    <th>Nome do Produto</th>
                    <th>Preço (R$)</th>
                    <th>Data de Cadastro</th>
                    <th>Categoria</th>
                    <th class="text-center">Ações</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="p : ${produtos}"
                    th:classappend="${p.valor.doubleValue() > 1000} ? 'table-danger'">

                    <td th:text="${p.idProduto}"></td>
                    <td th:text="${p.nome}"></td>

                    <td th:text="${#numbers.formatDecimal(p.valor, 1, 'POINT', 2, 'COMMA')}"></td>

                    <td th:text="${#temporals.format(p.dataCadastro, 'dd/MM/yyyy HH:mm')}"></td>

                    <!-- 🏷 CATEGORIA -->
                    <td th:text="${p.categoria != null ? p.categoria.nome : 'Sem categoria'}"></td>

                    <td class="text-center">

                        <a th:href="@{/produtos/editar/{id}(id=${p.idProduto})}"
                           class="btn btn-sm btn-dark-blue">
                            Editar
                        </a>

                        <a th:href="@{/produtos/excluir/{id}(id=${p.idProduto})}"
                           class="btn btn-sm btn-dark-blue"
                           onclick="return confirm('Tem certeza que deseja remover este produto?')">
                            Excluir
                        </a>

                    </td>

                </tr>
                </tbody>

            </table>

            <!-- ⚠️ VAZIO -->
            <div th:if="${#lists.isEmpty(produtos)}"
                 class="alert alert-info text-center">
                Nenhum produto cadastrado no momento.
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
