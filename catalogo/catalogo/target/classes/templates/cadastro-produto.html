<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Produto</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .bg-dark-blue {
            background-color: #0d1b2a !important;
        }

        .btn-dark-blue {
            background-color: #0d1b2a;
            color: #fff;
            border: none;
        }

        .btn-dark-blue:hover {
            background-color: #1b263b;
            color: #fff;
        }
    </style>
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark-blue mb-4">
    <div class="container">
        <a class="navbar-brand" href="/produtos">FATEC - Catálogo</a>
    </div>
</nav>

<div class="container">
    <div class="card shadow mx-auto" style="max-width: 500px;">

        <div class="card-header bg-dark-blue text-white">
            <h2 class="mb-0">Novo Produto</h2>
        </div>

        <div class="card-body">

            <form th:action="@{/produtos/salvar}" th:object="${produto}" method="post">

                <input type="hidden" th:field="*{idProduto}">

                <!-- NOME -->
                <div class="mb-3">
                    <label class="form-label">Nome do Produto</label>
                    <input type="text" th:field="*{nome}" class="form-control"
                           th:classappend="${#fields.hasErrors('nome')} ? 'is-invalid'">

                    <div class="invalid-feedback"
                         th:if="${#fields.hasErrors('nome')}"
                         th:errors="*{nome}">
                    </div>
                </div>

                <!-- VALOR -->
                <div class="mb-3">
                    <label class="form-label">Preço (R$)</label>
                    <input type="number" step="0.01" th:field="*{valor}" class="form-control"
                           th:classappend="${#fields.hasErrors('valor')} ? 'is-invalid'">

                    <div class="invalid-feedback"
                         th:if="${#fields.hasErrors('valor')}"
                         th:errors="*{valor}">
                    </div>
                </div>

                <!-- CATEGORIA -->
                <div class="mb-3">
                    <label class="form-label">Categoria</label>

                    <div class="d-flex gap-2">

                        <select th:field="*{categoria}" class="form-control" required>
                            <option value="" disabled selected>Selecione</option>

                            <option th:each="c : ${categorias}"
                                    th:value="${c.id}"
                                    th:text="${c.nome}">
                            </option>
                        </select>

                        <button type="button"
                                class="btn btn-outline-primary"
                                data-bs-toggle="modal"
                                data-bs-target="#modalCategoria">
                            +
                        </button>

                    </div>
                </div>

                <!-- BOTÕES -->
                <div class="d-flex justify-content-between">
                    <button type="submit" class="btn btn-dark-blue">Salvar</button>
                    <a href="/produtos" class="btn btn-outline-secondary">Voltar</a>
                </div>

            </form>

        </div>
    </div>
</div>

<!-- MODAL -->
<div class="modal fade" id="modalCategoria" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header bg-dark-blue text-white">
                <h5 class="modal-title">Nova Categoria</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>

            <form id="formCategoria">

                <div class="modal-body">
                    <label class="form-label">Nome da Categoria</label>
                    <input type="text" id="nomeCategoria" class="form-control" required>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-dark-blue">Salvar</button>
                </div>

            </form>

        </div>
    </div>
</div>

<!-- SCRIPT -->
<script>
    document.getElementById("formCategoria").addEventListener("submit", function (e) {
        e.preventDefault();

        const nome = document.getElementById("nomeCategoria").value;

        fetch("/categorias/api/salvar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ nome: nome })
        })
        .then(res => res.json())
        .then(data => {

            console.log("RETORNO API:", data);

            if (!data || !data.nome) {
                alert("Erro: API não retornou categoria válida");
                return;
            }

            const select = document.querySelector("select[name='categoria']");

            const option = document.createElement("option");
            option.value = data.id;     // ✅ ID correto
            option.text = data.nome;    // ✅ Nome correto
            option.selected = true;

            select.appendChild(option);

            const modal = bootstrap.Modal.getInstance(document.getElementById("modalCategoria"));
            modal.hide();

            document.getElementById("nomeCategoria").value = "";
        })
        .catch(err => {
            console.error("Erro:", err);
            alert("Erro ao salvar categoria");
        });
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
