<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar Produto</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .bg-dark-blue {
            background-color: #0d1b2a !important;
        }

        .btn-dark-blue {
            background-color: #0d1b2a;
            color: #fff;
            border: none;
        }

        .btn-dark-blue:hover {
            background-color: #1b263b;
            color: #fff;
        }
    </style>
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark-blue mb-4">
    <div class="container">
        <a class="navbar-brand" href="/produtos">
            FATEC - Gerenciador de Catálogo
        </a>
    </div>
</nav>

<div class="container mt-5">
    <div class="card shadow mx-auto" style="max-width: 500px;">

        <div class="card-header bg-dark-blue text-white">
            <h2 class="mb-0">Editar Produto</h2>
        </div>

        <div class="card-body">

            <form th:action="@{/produtos/editar/{id}(id=${produto.idProduto})}"
                  th:object="${produto}"
                  method="post">

                <input type="hidden" th:field="*{idProduto}">

                <!-- NOME -->
                <div class="mb-3">
                    <label class="form-label">Nome</label>
                    <input type="text"
                           th:field="*{nome}"
                           class="form-control"
                           required>
                </div>

                <!-- VALOR -->
                <div class="mb-3">
                    <label class="form-label">Valor</label>
                    <input type="number"
                           step="0.01"
                           th:field="*{valor}"
                           class="form-control"
                           required>
                </div>

                <!-- BOTÕES -->
                <div class="d-flex justify-content-between">
                    <button type="submit" class="btn btn-dark-blue">
                        Atualizar
                    </button>

                    <a href="/produtos" class="btn btn-outline-secondary">
                        Voltar
                    </a>
                </div>

            </form>

        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
